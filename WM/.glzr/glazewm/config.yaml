# ██║ █╗ ██║██║██╔██╗ ██║██║  ██║██║   ██║██║ █╗ ██║███████╗
# ██║███╗██║██║██║╚██╗██║██║  ██║██║   ██║██║███╗██║╚════██║
# ╚███╔███╔╝██║██║ ╚████║██████╔╝╚██████╔╝╚███╔███╔╝███████║
#  ╚══╝╚══╝ ╚═╝╚═╝  ╚═══╝╚═════╝  ╚═════╝  ╚══╝╚══╝ ╚══════╝

ign_pname:
  &ig_pname "Flow.Launcher|ScreenClippingHost|Clash.*|[Ss]amsung.*|.*Phone.*|.*QQ.*|.*聊天记录.*|WeChat|
  .*[Pp]hoto.*|Photos|图片查看器|[Ee]xplorer|Files|[Ss]etting.*|SnippingTool|
  .*[Cc]amera.*|idea64|lx-music-desktop"
ign_title: &ign_title "/[Pp]icture.in.[Pp]icture|.*jpg|.*.png|.*.webp|.*[Ss]etting.*/"
flt_pname: &flt_pname "/Todo|Taskmgr|ScreenClippingHost|Feishu/"

# ███████╗███████╗████████╗████████╗██╗███╗   ██╗ ██████╗ ███████╗
# ██╔════╝██╔════╝╚══██╔══╝╚══██╔══╝██║████╗  ██║██╔════╝ ██╔════╝
# ███████╗█████╗     ██║      ██║   ██║██╔██╗ ██║██║  ███╗███████╗
# ╚════██║██╔══╝     ██║      ██║   ██║██║╚██╗██║██║   ██║╚════██║
# ███████║███████╗   ██║      ██║   ██║██║ ╚████║╚██████╔╝███████║
# ╚══════╝╚══════╝   ╚═╝      ╚═╝   ╚═╝╚═╝  ╚═══╝ ╚═════╝ ╚══════╝


general:
  # Commands to run when the WM has started (e.g. to run a script or launch
  # another application). Here we are running a batch script to start Zebar.
  startup_commands: ["shell-exec %userprofile%/.glzr/zebar/start.bat"]
  focus_follows_cursor: false
  toggle_workspace_on_refocus: true
  floating_window_move_amount: "5%"
  # to make no setting changes.
  window_animations: "unchanged"
  cursor_jump:
    enabled: false
    trigger: "monitor_focus"

gaps:
  # Gap between adjacent windows.
  inner_gap: "2px"
  outer_gap:
    top: "2px"
    right: "1px"
    bottom: "1px"
    left: "1px"

window_effects:
  focused_window:
    border:
      enabled: true
      color: "#b2bcfb"

  # Visual effects to apply to non-focused windows.
  other_windows:
    border:
      enabled: false
      color: "#8087a2"

window_behavior:
  # New windows are created in this state whenever possible.
  # Allowed values: 'tiling', 'floating'.
  initial_state: "tiling"
  # Sets the default options for when a new window is created. This also
  # changes the defaults for when the state change commands, like
  # `set-floating`, are used without any flags.
  state_defaults:
    floating:
      centered: true
      shown_on_top: false

    fullscreen:
      # Maximize the window if possible. If the window doesn't have a
      # maximize button, then it'll be fullscreen'ed normally instead.
      maximized: false

workspaces:
  - name: "1"
    display_name: " "
    keep_alive: true
  - name: "2"
    display_name: " "
  - name: "3"
    display_name: "󰨞 "
  - name: "4"
    display_name: "󰨊 "
  - name: "5"
    display_name: "󰇩 "
  - name: "6"
    display_name: " "
  - name: "7"
    display_name: " "

window_rules:
  - commands: ["set-floating"]
    match:
      - window_process: { regex: *flt_pname }

  - commands: ["ignore"]
    match:
      - window_process: { equals: "zebar" }
      - window_title: { regex: *ign_title }
      - window_process: { regex: *ig_pname }
      - window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }

  - commands: ["move --workspace 2"]
    match:
      - window_process: { regex: "/WeChat|Feishu/" }

  - commands: ["move --workspace 3"]
    match:
      - window_title: { regex: ".*[Cc]ode.*" }

  - commands: ["move --workspace 4"]
    match:
      - window_process: { regex: "/wezterm-gui|WindowsTerminal/" }

  - commands: ["move --workspace 5"]
    match:
      - window_process: { regex: "vivaldi" }

  - commands: ["move --workspace 6"]
    match:
      - window_process: { regex: "/[sS]team/" }


# ██╗  ██╗███████╗██╗   ██╗██████╗ ██╗███╗   ██╗██████╗ ███████╗
# ██║ ██╔╝██╔════╝╚██╗ ██╔╝██╔══██╗██║████╗  ██║██╔══██╗██╔════╝
# █████╔╝ █████╗   ╚████╔╝ ██████╔╝██║██╔██╗ ██║██║  ██║███████╗
# ██╔═██╗ ██╔══╝    ╚██╔╝  ██╔══██╗██║██║╚██╗██║██║  ██║╚════██║
# ██║  ██╗███████╗   ██║   ██████╔╝██║██║ ╚████║██████╔╝███████║
# ╚═╝  ╚═╝╚══════╝   ╚═╝   ╚═════╝ ╚═╝╚═╝  ╚═══╝╚═════╝ ╚══════╝


binding_modes:
  - name: "view"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      # Move focused window in a given direction.
      - commands: ["move --direction left"]
        bindings: ["alt+a"]
      - commands: ["move --direction right"]
        bindings: ["alt+d"]
      - commands: ["move --direction up"]
        bindings: ["alt+w"]
      - commands: ["move --direction down"]
        bindings: ["alt+s"]
      - commands: ["toggle-tiling-direction"]
        bindings: ["alt+v"]
      # Press enter/escape to return to default keybindings.
      - commands: ["wm-disable-binding-mode --name view"]
        bindings: ["escape", "enter"]

  - name: "lock"
    keybindings:
      - commands: ["wm-disable-binding-mode --name view"]
        bindings: ["alt+z"]

keybindings:
  - commands: ["wm-enable-binding-mode --name view"]
    bindings: ["alt+c"]
  - commands: ["wm-enable-binding-mode --name lock"]
    bindings: ["alt+Z"]
  # Change the focused window to be floating.
  - commands: ["toggle-floating --centered"]
    bindings: ["alt+space"]
  - commands: ["toggle-tiling-direction"]
    bindings: ["alt+v"]
  # Re-evaluate configuration file.
  - commands: ["wm-reload-config"]
    bindings: ["alt+shift+r"]
  # Minimize focused window.
  - commands: ["toggle-minimized"]
    bindings: ["alt+m"]
  - commands: ["shell-exec D:/envir_vars/scoop/shims/wtp.exe"]
    bindings: ["ctrl+enter"]
  # Shift focus in a given direction.
  - commands: ["focus --direction left"]
    bindings: ["alt+h"]
  - commands: ["focus --direction right"]
    bindings: ["alt+l"]
  - commands: ["focus --direction up"]
    bindings: ["alt+k"]
  - commands: ["focus --direction down"]
    bindings: ["alt+j"]
  # Change focus to a workspace defined in `workspaces` config.
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["alt+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["alt+6"]
  # Focus the next/previous workspace defined in `workspaces` config.
  - commands: ["focus --next-workspace"]
    bindings: ["alt+d"]
  - commands: ["focus --prev-workspace"]
    bindings: ["alt+a"]

  # Move focused window to a workspace defined in `workspaces` config.
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["alt+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["alt+shift+6"]
